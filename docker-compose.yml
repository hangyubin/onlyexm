# ============================================================
# 宝塔面板 Docker 部署配置
#
# 使用方式：
#   方式1 - 拉取预构建镜像（推荐）：
#     1. 复制 .env.production 为 .env 并修改配置
#     2. docker compose pull && docker compose up -d
#
#   方式2 - 本地构建（镜像代理不可用或需要最新代码时）：
#     1. 复制 .env.production 为 .env 并修改配置
#     2. git pull 拉取最新代码
#     3. docker compose up -d --build
# ============================================================

services:
  app:
    # 预构建镜像（GitHub Actions 自动构建推送）
    image: ghcr.milu.moe/hangyubin/onlyexm:latest
    # 本地构建（取消下面注释即可从源码构建，需项目根目录有 Dockerfile）
    # build: .
    container_name: exsam-app
    env_file: .env
    ports:
      - "3080:80"
    # 允许容器通过 host.docker.internal 访问宿主机服务（MySQL/Redis）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # 持久化上传文件
      - uploads-data:/app/backend/uploads
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3080}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  uploads-data:
    driver: local
