# ============================================================
# 宝塔面板 Docker 部署配置
# 从 GitHub Container Registry 拉取预构建镜像
#
# 使用方式：
#   1. 复制 .env.production 为 .env 并修改配置
#   2. 修改 IMAGE 为你的 GitHub 仓库地址
#   3. docker compose up -d
# ============================================================

services:
  app:
    image: ghcr.io/${GITHUB_OWNER:-your-github-username}/exsam:latest
    container_name: exsam-app
    env_file: .env
    ports:
      - "3080:80"
    # 允许容器通过 host.docker.internal 访问宿主机服务（MySQL/Redis）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # 持久化上传文件
      - uploads-data:/app/backend/uploads
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3080}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  uploads-data:
    driver: local
